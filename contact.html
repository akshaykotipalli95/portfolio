<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260306-2" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-3"></div>

  <header class="header">
    <nav class="navbar container">
      <a href="index.html" class="brand">Akshay<span>Portfolio</span></a>
      <button class="menu-btn" id="menuBtn" aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="index.html#certificates">Certificates</a></li>
        <li><a href="index.html#resume">Resume</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container contact-wrap">
    <section class="page-header reveal">
      <h1 class="page-title">Contact Me</h1>
      <p class="contact-intro">Email: kotipalliakshay51@gmail.com | Mobile: +91-9502284857</p>
    </section>

    <section class="reveal">
      <div class="hero-actions">
        <a href="mailto:kotipalliakshay51@gmail.com" class="btn btn-outline">Email Me</a>
        <a href="tel:+919502284857" class="btn btn-outline">Call Me</a>
        <a href="Akshay__Resume.pdf" class="btn btn-outline" target="_blank" rel="noopener">View Resume</a>
      </div>

      <div class="contact-card">
        <form id="contactForm" class="contact-form">
          <div class="contact-row">
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" placeholder="Enter your name" autocomplete="name" required />
            </div>

            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="Enter your email" autocomplete="email" required />
            </div>
          </div>

          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>
          </div>

          <div class="contact-actions">
            <button type="submit" class="btn btn-primary">Send Message</button>
            <p id="formStatus" class="form-note" aria-live="polite"></p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer container">
    <p>© 2026 Kotipalli Akshay. All rights reserved.</p>
  </footer>

  <script src="script.js?v=20260304-7"></script>
</body>
